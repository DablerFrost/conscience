name: CONSCIENCE Daily Data Refresh

on:
  schedule:
    # Runs every day at 00:05 UTC — after midnight, data sources have updated
    - cron: '5 0 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual refresh'

jobs:
  fetch-conscience-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to commit conscience-data.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch all CONSCIENCE data sources
        run: node scripts/fetch-conscience-data.js

      - name: Commit conscience-data.json if changed
        run: |
          git config user.name  "VYRION Data Bot"
          git config user.email "data-bot@vyrion.earth"
          git add conscience-data.json
          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No data changes detected — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: daily conscience refresh ${TIMESTAMP}"
            git push
            echo "conscience-data.json updated and pushed"
          fi
